name: Security Gate

# Unified validation + shift-left security gate. Replaces the old validate.yml.
# Preserves terraform init/validate; adds gitleaks secret scan, tfsec, Trivy
# IaC + container, and Bandit/pip-audit Python SAST. Auto-detects stack so each
# job self-skips when not applicable.
#
# Hard gate at rollout: leaked secrets (gitleaks) only. IaC, SAST and container
# findings are report-only to start; harden per repo by flipping the noted
# soft_fail / exit-code values once a repo is clean.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: Detect stack
    runs-on: ubuntu-latest
    outputs:
      has_terraform: ${{ steps.scan.outputs.has_terraform }}
      has_python: ${{ steps.scan.outputs.has_python }}
      has_dockerfile: ${{ steps.scan.outputs.has_dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: scan
        run: |
          tf=false; py=false; dk=false
          [ -n "$(find . -name '*.tf' -not -path './.git/*' -print -quit)" ] && tf=true
          [ -n "$(find . -name '*.py' -not -path './.git/*' -not -path '*/.venv/*' -not -path '*/venv/*' -print -quit)" ] && py=true
          [ -n "$(find . -iname 'Dockerfile*' -not -path './.git/*' -print -quit)" ] && dk=true
          echo "has_terraform=$tf" >> "$GITHUB_OUTPUT"
          echo "has_python=$py"    >> "$GITHUB_OUTPUT"
          echo "has_dockerfile=$dk" >> "$GITHUB_OUTPUT"

  # Preserved from the old validate.yml: terraform fmt-free init + validate.
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_terraform == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init + validate (all roots)
        run: |
          for d in $(find . -name '*.tf' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u); do
            echo "==> $d"
            terraform -chdir="$d" init -backend=false -input=false >/dev/null
            terraform -chdir="$d" validate -no-color
          done

  # Secret scanning runs on every repo, always. The one hard gate at rollout.
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # IaC scanning. Report-only at rollout; flip soft_fail false / exit-code 1 to harden.
  iac:
    name: IaC scan (Checkov + tfsec + Trivy)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_terraform == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: true
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true
      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM

  # Python SAST + dependency CVEs. Report-only at rollout.
  python:
    name: Python SAST (Bandit + pip-audit)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bandit
        run: |
          pip install --quiet bandit
          bandit -r . -ll -x ./.venv,./venv,./node_modules,./tests || true
      - name: pip-audit
        run: |
          pip install --quiet pip-audit
          req=$(find . -maxdepth 2 -name 'requirements*.txt' -not -path '*/.venv/*' | head -1)
          if [ -n "$req" ]; then
            pip-audit -r "$req" || true
          else
            echo "No requirements file found, skipping dependency CVE scan."
          fi

  # Container image scan. Only when a Dockerfile is present. Report-only at rollout.
  container:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_dockerfile == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          df=$(find . -iname 'Dockerfile' -not -path './.git/*' | head -1)
          docker build -f "$df" -t local-scan-target:${{ github.sha }} "$(dirname "$df")"
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: local-scan-target:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
